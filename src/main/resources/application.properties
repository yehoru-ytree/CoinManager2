spring.application.name=MailAggregator
server.port=8081

spring.messages.basename=messages
spring.messages.encoding=UTF-8

spring.datasource.url=jdbc:postgresql://localhost:5432/bankaggregator
spring.datasource.username=appuser
spring.datasource.password=${POSTGRES_PASSWORD}
spring.flyway.default-schema=bankaggregator

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.datasource.hikari.data-source-properties.options=-c TimeZone=UTC

monobank.token=${MONOBANK_TOKEN}
monobank.account-id=${MONOBANK_ACCOUNT_ID}
monobank.statement-window-minutes=1440
monobank.poll-interval=PT5M

google.sheet-id=${GOOGLE_SHEET_ID}
# Master template spreadsheet \u2014 read-only source from which we copy the template tab into each
# newly created household's destination sheet. Also used by BootstrapHouseholdRunner as the
# template-tab title for the seed household, so the title MUST match the tab in the master.
google.template.spreadsheet-id=${TEMPLATE_SPREADSHEET_ID}
google.template.sheet-title=${TEMPLATE_SHEET_TITLE}

app.timezone=Europe/Zaporozhye

telegram.bot-token=${TELEGRAM_BOT_TOKEN}
telegram.owner-chat-id=${TELEGRAM_OWNER_CHAT_ID}
