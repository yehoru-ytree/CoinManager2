displayName.unknown=Кто-то

# =============================================================================
# Help. Placeholders:
#   {0}=createHousehold trigger
#   {1}=join trigger
#   {2}=addCard trigger
#   {3}=invite trigger
#   {4}=addCategory trigger
#   {5}=cash trigger
#   {6}=save trigger
#   {7}=cancel trigger
# =============================================================================
help=Что я умею:\n\n/start — узнать свой chatId.\n\n── Если ты ещё не зарегистрирован ──\n«{0}» — пошаговый диалог: создаю семью + засеваю дефолтные категории.\n«{1} <код>» — войти в чужую семью по инвайт-коду.\n\n── Если ты уже в семье ──\n«{2}» — пошаговый диалог привязки Monobank-токена и accountId.\n«{3}» — сгенерировать одноразовый код, чтобы пригласить кого-то.\n«{4}» — пошаговый диалог создания новой категории.\n«{5}» — записать трату наличкой: введи сумму → выбери категорию из клавиатуры.\n\n── Реплаи на лог транзакции ──\n• «{6}» — клавиатура выбора категории; описание транзакции пойдёт в её ключевые слова.\n• Любой другой текст — комментарий в Google Sheets (ряд 2 столбца того дня; через «;»).\n\nНа любом шаге пошагового диалога реплай «{7}» — выйти из флоу.\n«помощь» или /help — показать это сообщение.
