# Monobank sub-flow.
addCard.mono.askToken=Ответом на это сообщение дай Monobank API токен (получи на api.monobank.ua).
addCard.mono.emptyToken=Пустое не подходит. Ответом на это сообщение дай Monobank токен:
addCard.mono.tokenFailed=❌ Не получилось получить инфо по токену: {0}
addCard.mono.noAccounts=❌ Monobank не вернул ни одного счёта по этому токену.
# {0}=number of accounts
addCard.mono.askAccountChoice=Нашёл {0} счетов. Выбери нужный:

# PrivatBank sub-flow (ACP statements API — Privat24 для бизнеса).
addCard.privat.askToken=Ответом на это сообщение дай Privat API token (получи в Privat24 для бизнеса → Налаштування → Автоматизація).
addCard.privat.emptyToken=Пустое не подходит. Ответом на это сообщение дай Privat token:
addCard.privat.askClientId=Ответом на это сообщение дай Privat clientId (та же страница в Privat24 для бизнеса — поле «ID клиента»):
addCard.privat.emptyClientId=Пустое не подходит. Ответом на это сообщение дай clientId:
addCard.privat.askIban=Ответом на это сообщение дай IBAN счёта (UA...):
addCard.privat.emptyIban=Пустое не подходит. Ответом на это сообщение дай IBAN:
addCard.privat.badIban=IBAN должен начинаться с «UA» и быть 29 символов. Ответом на это сообщение попробуй ещё:

