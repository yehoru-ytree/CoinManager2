# =============================================================================
# Input matching (what the bot listens for). Edit these to rename triggers
# without touching code.
# =============================================================================
trigger.save=Сохранить
trigger.addCategory=Добавить категорию
trigger.createHousehold=Создать таблицу
trigger.addCard=Привязать карту
trigger.cash=Наличка
trigger.invite=Пригласить
trigger.join=Присоединиться
trigger.cancel=Забей
trigger.emptyKeywords=-
# Help triggers: comma-separated, case-insensitive
trigger.help=помощь, /help, help, /?, ?

# =============================================================================
# Validation rules for the add-category flow.
# =============================================================================
validation.namePattern=[A-Z_]+
validation.priority.min=1
validation.priority.max=100

# =============================================================================
# Greetings & fallback
# =============================================================================
bot.start.greeting=OK. Твой chatId={0}
bot.unknown=Не понял. Напиши «помощь» чтобы увидеть, что я умею.
bot.notRegistered=Ты не зарегистрирован. Создай таблицу командой «{0}» или попроси кого-то прислать тебе «{1} <код>». /help для деталей.

# =============================================================================
# Flow control (cancel / restart)
# =============================================================================
flow.cancelled=Окей, забил.
flow.restart.continue=ℹ️ Старый флоу прерван, ничего не сохранено.
flow.restart.startingNew=ℹ️ Старый флоу прерван, ничего не сохранено. Начинаю заново.
flow.alreadyInHousehold=Ты уже в семье. Создавать новую нельзя.

# =============================================================================
# Inline keyboard buttons
# =============================================================================
keyboard.ignore=Игнорировать
keyboard.other=Другое

# =============================================================================
# Callback toast acknowledgements (short text shown after tapping a button)
# =============================================================================
callback.saved=Сохранено
callback.badCallback=Неверный callback
callback.notAllowed=Нельзя
callback.txNotFound=Транзакция не найдена
callback.alreadyDone=Уже категоризовано
callback.alreadyPresent=Уже есть
callback.categoryNotFound=Категория не найдена
callback.empty=Пусто

# =============================================================================
# Transaction categorisation prompt (OTHER tx / cash entry)
# =============================================================================
# {0}=description, {1}=tx id, {2}=time, {3}=amount
tx.prompt=🧾 {0}\nID: {1}\nTime: {2}\nAmount: {3}

# =============================================================================
# Transaction log (sent after auto-categorisation or post-decision)
# =============================================================================
log.title=🧾 {0}
# {0}=date, {1}=time, {2}=amount, {3}=currency
log.body={0} {1}  −{2} {3}
log.tail.category=Категория: {0}
log.tail.ignored=Игнорировано

# =============================================================================
# Save-keyword (reply «Сохранить» on a log)
# =============================================================================
savekw.choose=Выбери категорию для «{0}»:
savekw.txMissing=❌ Не нашёл транзакцию для этого сообщения
savekw.txDbMissing=❌ Транзакция не найдена в БД
savekw.emptyDescription=❌ У транзакции пустое описание, нечего сохранять
savekw.success=✓ Добавил «{0}» в категорию «{1}»
savekw.alreadyPresent=ℹ️ «{0}» уже в категории «{1}»
savekw.categoryNotFound=❌ Категория не найдена
savekw.empty=❌ Пустое описание, нечего сохранять

# =============================================================================
# Comment flow (any other reply to a log)
# =============================================================================
comment.saveError=❌ Не получилось сохранить коммент
comment.saved=✓ Коммент сохранён
comment.notFound=❌ Не нашёл транзакцию для этого сообщения

# =============================================================================
# Add-category step-by-step flow
# =============================================================================
# {0}=cancel trigger
addCategory.start=Дай название категории (заглавные латинские буквы и `_`). На любом шаге ответь «{0}», чтобы выйти.
addCategory.name.bad=Имя должно быть из заглавных латинских букв и `_`. Попробуй ещё:
addCategory.name.exists=Категория «{0}» уже существует. Дай другое имя:
addCategory.displayName.prompt=Дай читаемое название:
addCategory.displayName.empty=Пустое не подходит. Дай читаемое название:
# {0}=min, {1}=max
addCategory.priority.prompt=Дай приоритет ({0}..{1}):
addCategory.priority.bad=Нужно число от {0} до {1}. Попробуй ещё:
# {0}=empty-keywords trigger
addCategory.keywords.prompt=Дай ключевые слова через запятую, или «{0}» чтобы оставить пустым (тогда добавишь через «Сохранить» в будущем):
addCategory.createFailed=❌ Не получилось создать категорию: {0}
# {0}=name, {1}=display name, {2}=sheet row
addCategory.created=✓ Создал «{0}» ({1}) на sheet_row={2}.
# {0}=actor name, {1}=display name
addCategory.broadcast=ℹ️ {0} добавил(а) новую категорию «{1}».

# =============================================================================
# Create-household step-by-step flow
# =============================================================================
# {0}=cancel trigger
createHousehold.start=Дай ID Google Sheet'а (тот длинный код из URL таблицы). На любом шаге ответь «{0}» чтобы выйти.
createHousehold.emptySheetId=Пустое не подходит. Дай ID Google Sheet'а:
createHousehold.askTemplate=Дай название template-листа (как называется лист, который служит шаблоном для месяцев, например «Февраль 2026»):
createHousehold.emptyTemplate=Пустое не подходит. Дай название template-листа:
createHousehold.failed=❌ Не получилось создать семью: {0}
# {0}=add-card trigger, {1}=service-account email
createHousehold.success=✓ Создал твою таблицу и засеял 23 категории по умолчанию.\nНе забудь расшарить Google Sheet на {1} (с правами «Editor») — иначе бот не сможет писать в таблицу.\nДальше — «{0}».

# =============================================================================
# Join household
# =============================================================================
# {0}=join trigger
join.usage=Использование: «{0} <код>» — попроси код у того, кто уже в боте.
# {0}=add-card trigger
join.success=✓ Добро пожаловать в семью! Привяжи свою карту — «{0}».
join.alreadyJoined=Ты уже в семье. Присоединяться второй раз нельзя.
join.invalidToken=❌ Неизвестный или уже использованный код.

# =============================================================================
# Invite
# =============================================================================
# {0}=token, {1}=join trigger
invite.result=✓ Инвайт-код: {0}\nПерешли этому человеку: «{1} {0}». Код одноразовый.

# =============================================================================
# Add card (Monobank) step-by-step flow
# =============================================================================
# {0}=cancel trigger
addCard.start=Дай Monobank API токен (получи на api.monobank.ua). На любом шаге ответь «{0}» чтобы выйти.
addCard.emptyToken=Пустое не подходит. Дай Monobank токен:
addCard.askAccountId=Дай Monobank accountId (тот, который тебе нужен — из /api/mono/client-info или из приложения):
addCard.emptyAccount=Пустое не подходит. Дай accountId:
addCard.failed=❌ Не получилось привязать карту: {0}
addCard.success=✓ Привязал карту. Транзакции скоро начнут прилетать.
# {0}=actor name
addCard.broadcast=ℹ️ {0} привязал(а) новую карту. Её транзакции скоро начнут прилетать в общий лог.

# =============================================================================
# Cash entry flow
# =============================================================================
# {0}=cancel trigger
cash.start=Введи сумму трат наличкой (например 245.50 или 245). На любом шаге ответь «{0}» чтобы выйти.
cash.badAmount=Не понял. Введи положительное число — сумму в гривнах:
cash.failed=❌ Не получилось записать: {0}

