# Input matching (what the bot listens for). Edit these to rename triggers without touching code.
trigger.save=Сохранить
trigger.addCategory=Добавить категорию
trigger.cancel=Забей
trigger.emptyKeywords=-
# Help triggers: comma-separated, case-insensitive
trigger.help=помощь, /help, help, /?, ?

# Validation rules for the add-category flow.
validation.namePattern=[A-Z_]+
validation.priority.min=1
validation.priority.max=100

# Greetings
bot.start.greeting=OK. Your chatId={0}

# Inline button toast acknowledgements (short text shown after tapping)
callback.saved=Saved
callback.alreadyPresent=Already present
callback.categoryNotFound=Category not found
callback.empty=Empty
callback.notAllowed=Not allowed
callback.badCallback=Bad callback
callback.txNotFound=Tx not found

# Categorisation prompt (sent when a transaction falls into OTHER)
tx.prompt=🧾 {0}\nID: {1}\nTime: {2}\nAmount: {3}

# Transaction log (sent after auto-categorization or post-decision)
log.title=🧾 {0}
log.body={0} {1}  −{2} {3}
log.tail.category=Категория: {0}
log.tail.ignored=Игнорировано

# Inline keyboard buttons
keyboard.ignore=Игнорировать
keyboard.other=Другое

# Save-keyword flow (reply «Сохранить» on a log)
savekw.choose=Выбери категорию для «{0}»:
savekw.txMissing=❌ Не нашёл транзакцию для этого сообщения
savekw.txDbMissing=❌ Транзакция не найдена в БД
savekw.emptyDescription=❌ У транзакции пустое описание, нечего сохранять
savekw.success=✓ Добавил «{0}» в категорию «{1}»
savekw.alreadyPresent=ℹ️ «{0}» уже в категории «{1}»
savekw.categoryNotFound=❌ Категория не найдена
savekw.empty=❌ Пустое описание, нечего сохранять

# Comment flow (any other reply to a log)
comment.saveError=❌ Не получилось сохранить коммент
comment.saved=✓ Comment saved
comment.notFound=❌ Не нашёл транзакцию для этого сообщения

# Add-category step-by-step flow
flow.start=Дай название категории (заглавные латинские буквы и `_`). На любом шаге ответь «{0}», чтобы выйти.
flow.name.bad=Имя должно быть из заглавных латинских букв и `_`. Попробуй ещё:
flow.name.exists=Категория «{0}» уже существует. Дай другое имя:
flow.displayName.prompt=Дай читаемое название:
flow.displayName.empty=Пустое не подходит. Дай читаемое название:
flow.priority.prompt=Дай приоритет ({0}..{1}):
flow.priority.bad=Нужно число от {0} до {1}. Попробуй ещё:
flow.keywords.prompt=Дай ключевые слова через запятую, или «{0}» чтобы оставить пустым (тогда добавишь через «Сохранить» в будущем):
flow.createFailed=❌ Не получилось создать категорию: {0}
flow.created=✓ Создал «{0}» ({1}) на sheet_row={2}.
flow.cancelled=Окей, забил.
flow.restarted=ℹ️ Старый флоу прерван, ничего не сохранено. Начинаю заново.

# Help & fallback
# Placeholders: {0}=trigger.addCategory, {1}=trigger.cancel, {2}=trigger.save
help=Что я умею:\n\n/start — узнать свой chatId.\n\n«{0}» — пошаговый диалог создания новой категории. Отвечай реплаем на мои сообщения. На любом шаге реплай «{1}» — выйти. Повторное «{0}» обычным сообщением (не реплаем) — рестарт с нуля.\n\nРеплаи на лог транзакции от меня:\n• «{2}» — выберу категорию из клавиатуры, description транзакции пойдёт в её keywords (и потом будет авто-категоризоваться).\n• Любой другой текст — запишу как комментарий в Google Sheets (ряд 2 столбца того дня; несколько комментов соединяются через «;»).\n\n«помощь» или /help — показать это сообщение.
unknown=Не понял. Напиши «помощь» чтобы увидеть, что я умею.
